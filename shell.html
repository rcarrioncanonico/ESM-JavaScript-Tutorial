<!DOCTYPE html>
<html>
<head>
    <title>Phaser Lab Stage</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body style="margin:0; background:#222; overflow:hidden; display:flex; justify-content:center; align-items:center; height:100vh;">
    <div id="phaser-game"></div>
    <script>
        const stageOrigin = window.location.origin;

        function showMessage(message, color) {
            document.body.innerHTML = `<h1 style="color:${color}; font-family:sans-serif;">${message}</h1>`;
        }

        function runStudentCode(studentCode) {
            if (!studentCode) {
                showMessage("Waiting for Script...", "white");
                return;
            }

            try {
                eval(studentCode);
            } catch (e) {
                showMessage(`Code Error: ${e.message}`, "red");
            }
        }

        // Preferred transport: notebook opens shell.html, receives READY, then posts RUN_TASK.
        window.addEventListener("message", (event) => {
            if (event.origin !== stageOrigin) return;
            if (!event.data || event.data.type !== "RUN_TASK") return;
            if (event.source && typeof event.source.postMessage === "function") {
                try {
                    event.source.postMessage({ type: "SHELL_ACK" }, event.origin);
                } catch (_e) {
                    // Ignore ACK failures and continue executing payload.
                }
            }
            runStudentCode(event.data.code);
        });

        if (window.opener && !window.opener.closed) {
            try {
                // Use wildcard target since opener can be notebook output origin, not stage origin.
                window.opener.postMessage({ type: "SHELL_READY" }, "*");
            } catch (_e) {
                // Ignore opener messaging failures and continue.
            }
        }

        // Legacy fallback: still support code in URL during migration.
        const rawHash = window.location.hash || "";
        const hashCode = rawHash.startsWith("#code=") ? rawHash.slice(6) : null;
        const queryCode = new URLSearchParams(window.location.search).get("code");
        let legacyCode = hashCode !== null ? hashCode : queryCode;

        if (hashCode !== null && typeof legacyCode === "string") {
            try {
                legacyCode = decodeURIComponent(legacyCode);
            } catch (_e) {
                // Ignore decode failure and keep best-effort payload.
            }
        }

        if (typeof legacyCode === "string" && /%[0-9A-Fa-f]{2}/.test(legacyCode)) {
            try {
                legacyCode = decodeURIComponent(legacyCode);
            } catch (_e) {
                // Ignore decode failure and keep best-effort payload.
            }
        }

        runStudentCode(legacyCode);
    </script>
</body>
</html>
