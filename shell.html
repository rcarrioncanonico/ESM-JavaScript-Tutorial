<!DOCTYPE html>
<html>
<head>
    <title>Phaser Lab Stage</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body style="margin:0; background:#222; overflow:hidden; display:flex; justify-content:center; align-items:center; height:100vh;">
    <div id="phaser-game"></div>
    <script>
        // 2. Look for the "code" inside the URL hash first (safer for longer payloads),
        // then fall back to query params for backward compatibility.
        const rawHash = window.location.hash || '';
        const hashCode = rawHash.startsWith('#code=') ? rawHash.slice(6) : null;
        const queryCode = new URLSearchParams(window.location.search).get('code');

        let studentCode = hashCode !== null ? hashCode : queryCode;

        // Hash payload is percent-encoded by play(taskCode); decode it.
        if (hashCode !== null && typeof studentCode === 'string') {
            try {
                studentCode = decodeURIComponent(studentCode);
            } catch (_e) {
                // Keep original string; eval will surface a meaningful syntax error.
            }
        }

        // Safety: if still percent-encoded, try one more decode pass.
        if (typeof studentCode === 'string' && /%[0-9A-Fa-f]{2}/.test(studentCode)) {
            try {
                studentCode = decodeURIComponent(studentCode);
            } catch (_e) {
                // Ignore decode failure and continue with best-effort payload.
            }
        }
        
        if (studentCode) {
            try {
                // 3. Run the student's JavaScript logic
                eval(studentCode);
            } catch (e) {
                document.body.innerHTML = `<h1 style="color:red; font-family:sans-serif;">Code Error: ${e.message}</h1>`;
            }
        } else {
            document.body.innerHTML = `<h1 style="color:white; font-family:sans-serif;">Waiting for Script...</h1>`;
        }
    </script>
</body>
</html>
